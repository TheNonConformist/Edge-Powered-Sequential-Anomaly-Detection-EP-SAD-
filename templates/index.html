<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EP-SAD Security Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0f1a2b;
            color: #ffffff;
            line-height: 1.6;
        }

        .dashboard {
            display: grid;
            grid-template-columns: 1fr 400px;
            grid-template-rows: 80px 1fr 300px;
            grid-template-areas: 
                "header header"
                "video alerts"
                "stats alerts";
            height: 100vh;
            gap: 15px;
            padding: 15px;
        }

        @media (max-width: 1400px) {
            .dashboard {
                grid-template-columns: 1fr 350px;
            }
        }

        @media (max-width: 1200px) {
            .dashboard {
                grid-template-columns: 1fr 300px;
            }
        }

        .header {
            grid-area: header;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 30px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo h1 {
            font-size: 24px;
            font-weight: 600;
        }

        .logo .tagline {
            font-size: 14px;
            opacity: 0.8;
        }

        .system-status {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #4CAF50;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        .video-container {
            grid-area: video;
            background: #1a2536;
            border-radius: 10px;
            overflow: hidden;
            position: relative;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .video-feed {
            max-width: 100%;
            max-height: 100%;
            width: auto;
            height: auto;
            object-fit: contain;
            display: block;
        }

        .video-overlay {
            position: absolute;
            top: 15px;
            left: 15px;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px 15px;
            border-radius: 5px;
            font-size: 14px;
        }

        .alerts-panel {
            grid-area: alerts;
            background: #1a2536;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        .panel-header {
            padding: 20px;
            border-bottom: 1px solid #2d3a4b;
            display: flex;
            justify-content: between;
            align-items: center;
        }

        .panel-header h2 {
            font-size: 18px;
            font-weight: 600;
        }

        .alert-count {
            background: #e74c3c;
            color: white;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: bold;
        }

        .alerts-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .alert-item {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 10px;
            border-left: 4px solid #e74c3c;
            transition: all 0.3s ease;
        }

        .alert-item.acknowledged {
            opacity: 0.6;
            border-left-color: #7f8c8d;
        }

        .alert-item.high { border-left-color: #e74c3c; }
        .alert-item.medium { border-left-color: #f39c12; }
        .alert-item.low { border-left-color: #3498db; }

        .alert-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 8px;
        }

        .alert-type {
            font-weight: 600;
            font-size: 14px;
        }

        .alert-severity {
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: bold;
            text-transform: uppercase;
        }

        .severity-high { background: #e74c3c; }
        .severity-medium { background: #f39c12; }
        .severity-low { background: #3498db; }

        .alert-message {
            font-size: 13px;
            margin-bottom: 8px;
            opacity: 0.9;
        }

        .alert-meta {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            opacity: 0.7;
        }

        .alert-actions {
            margin-top: 10px;
            display: flex;
            gap: 8px;
        }

        .btn {
            padding: 6px 12px;
            border: none;
            border-radius: 4px;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-ack {
            background: #27ae60;
            color: white;
        }

        .btn-ack:hover {
            background: #219a52;
        }

        .btn-dismiss {
            background: #7f8c8d;
            color: white;
        }

        .stats-panel {
            grid-area: stats;
            background: #1a2536;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            height: 100%;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .stat-value {
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 12px;
            opacity: 0.8;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stat-card.fps .stat-value { color: #2ecc71; }
        .stat-card.alerts .stat-value { color: #e74c3c; }
        .stat-card.tracks .stat-value { color: #3498db; }
        .stat-card.frames .stat-value { color: #9b59b6; }

        .controls {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .btn-test {
            background: #9b59b6;
            color: white;
            padding: 8px 16px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
        }

        .btn-test:hover {
            background: #8e44ad;
        }

        /* Scrollbar styling */
        .alerts-list::-webkit-scrollbar {
            width: 6px;
        }

        .alerts-list::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
        }

        .alerts-list::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.3);
            border-radius: 3px;
        }

        .timestamp {
            font-size: 11px;
            opacity: 0.7;
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <!-- Header -->
        <header class="header">
            <div class="logo">
                <h1>EP-SAD Security Dashboard</h1>
                <span class="tagline">Edge-Powered Sequential Anomaly Detection</span>
            </div>
            <div class="system-status">
                <div class="status-indicator">
                    <div class="status-dot"></div>
                    <span>SYSTEM ACTIVE</span>
                </div>
                <div id="current-time" class="timestamp"></div>
            </div>
        </header>

        <!-- Video Feed -->
        <div class="video-container">
            <img src="{{ url_for('video_feed') }}" class="video-feed" alt="Live Video Feed">
            <div class="video-overlay">
                LIVE INTELLIGENT SURVEILLANCE
            </div>
        </div>

        <!-- Alerts Panel -->
        <div class="alerts-panel">
            <div class="panel-header">
                <h2>Security Alerts</h2>
                <div class="alert-count" id="alert-count">0</div>
            </div>
            <div class="alerts-list" id="alerts-list">
                <!-- Alerts will be populated by JavaScript -->
                <div class="alert-item" style="text-align: center; opacity: 0.7;">
                    Loading alerts...
                </div>
            </div>
            <div class="controls">
                <button class="btn-test" onclick="generateTestAlert()">Test Alert</button>
                <button class="btn-test" onclick="acknowledgeAll()">Acknowledge All</button>
            </div>
        </div>

        <!-- Statistics Panel -->
        <div class="stats-panel">
            <h3 style="margin-bottom: 15px;">System Statistics</h3>
            <div class="stats-grid">
                <div class="stat-card fps">
                    <div class="stat-value" id="fps-value">0</div>
                    <div class="stat-label">Current FPS</div>
                </div>
                <div class="stat-card alerts">
                    <div class="stat-value" id="total-alerts">0</div>
                    <div class="stat-label">Total Alerts</div>
                </div>
                <div class="stat-card tracks">
                    <div class="stat-value" id="active-tracks">0</div>
                    <div class="stat-label">Active Tracks</div>
                </div>
                <div class="stat-card frames">
                    <div class="stat-value" id="total-frames">0</div>
                    <div class="stat-label">Frames Processed</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Update current time
        function updateTime() {
            const now = new Date();
            document.getElementById('current-time').textContent = 
                now.toLocaleString('en-US', { 
                    year: 'numeric',
                    month: 'short',
                    day: 'numeric',
                    hour: '2-digit',
                    minute: '2-digit',
                    second: '2-digit',
                    hour12: true 
                });
        }
        setInterval(updateTime, 1000);
        updateTime();

        // Fetch and display alerts
        async function fetchAlerts() {
            try {
                const response = await fetch('/api/alerts');
                const data = await response.json();
                
                const alertsList = document.getElementById('alerts-list');
                const alertCount = document.getElementById('alert-count');
                
                alertCount.textContent = data.unacknowledged;
                
                if (data.alerts.length === 0) {
                    alertsList.innerHTML = '<div class="alert-item" style="text-align: center; opacity: 0.7;">No active alerts</div>';
                    return;
                }
                
                alertsList.innerHTML = data.alerts.map(alert => `
                    <div class="alert-item ${alert.severity} ${alert.acknowledged ? 'acknowledged' : ''}">
                        <div class="alert-header">
                            <div class="alert-type">${alert.type.replace('_', ' ').toUpperCase()}</div>
                            <div class="alert-severity severity-${alert.severity}">${alert.severity}</div>
                        </div>
                        <div class="alert-message">${alert.message}</div>
                        <div class="alert-meta">
                            <span>Object: ${alert.object_id}</span>
                            <span>Location: ${alert.location}</span>
                        </div>
                        <div class="timestamp">${new Date(alert.timestamp).toLocaleString()}</div>
                        ${!alert.acknowledged ? `
                            <div class="alert-actions">
                                <button class="btn btn-ack" onclick="acknowledgeAlert(${alert.id})">Acknowledge</button>
                            </div>
                        ` : ''}
                    </div>
                `).join('');
            } catch (error) {
                console.error('Error fetching alerts:', error);
            }
        }

        // Fetch system statistics
        async function fetchStats() {
            try {
                const response = await fetch('/api/stats');
                const data = await response.json();
                
                document.getElementById('fps-value').textContent = data.current_fps.toFixed(1);
                document.getElementById('total-alerts').textContent = data.total_alerts;
                document.getElementById('active-tracks').textContent = data.active_tracks;
                document.getElementById('total-frames').textContent = (data.total_frames / 1000).toFixed(1) + 'K';
            } catch (error) {
                console.error('Error fetching stats:', error);
            }
        }

        // Acknowledge an alert
        async function acknowledgeAlert(alertId) {
            try {
                const response = await fetch(`/api/alerts/${alertId}/acknowledge`, {
                    method: 'POST'
                });
                if (response.ok) {
                    fetchAlerts(); // Refresh alerts
                }
            } catch (error) {
                console.error('Error acknowledging alert:', error);
            }
        }

        // Acknowledge all alerts
        async function acknowledgeAll() {
            try {
                const response = await fetch('/api/alerts');
                const data = await response.json();
                
                for (const alert of data.alerts) {
                    if (!alert.acknowledged) {
                        await fetch(`/api/alerts/${alert.id}/acknowledge`, { method: 'POST' });
                    }
                }
                fetchAlerts(); // Refresh alerts
            } catch (error) {
                console.error('Error acknowledging all alerts:', error);
            }
        }

        // Generate test alert
        async function generateTestAlert() {
            try {
                const response = await fetch('/api/test_alert', { method: 'POST' });
                if (response.ok) {
                    fetchAlerts(); // Refresh alerts
                    fetchStats(); // Refresh stats
                }
            } catch (error) {
                console.error('Error generating test alert:', error);
            }
        }

        // Periodic updates
        setInterval(fetchAlerts, 2000); // Update alerts every 2 seconds
        setInterval(fetchStats, 1000); // Update stats every second

        // Initial load
        fetchAlerts();
        fetchStats();
    </script>
</body>
</html>
