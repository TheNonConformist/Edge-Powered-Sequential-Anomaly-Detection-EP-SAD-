<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MILITARY SURVEILLANCE COMMAND</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Rajdhani', 'Orbitron', monospace;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 50%, #0d1b2a 100%);
            color: #00ff41;
            line-height: 1.4;
            background-attachment: fixed;
        }

        .dashboard {
            display: grid;
            grid-template-columns: 1fr 380px;
            grid-template-rows: 70px 1fr;
            grid-template-areas: 
                "header header"
                "video right-panel";
            height: 100vh;
            gap: 12px;
            padding: 12px;
        }

        .right-panel {
            grid-area: right-panel;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        @media (max-width: 1400px) {
            .dashboard {
                grid-template-columns: 1fr 350px;
            }
        }

        @media (max-width: 1200px) {
            .dashboard {
                grid-template-columns: 1fr 300px;
            }
        }

        .header {
            grid-area: header;
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 50%, #0d1b2a 100%);
            border: 2px solid #00ff41;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 25px;
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.3), inset 0 0 20px rgba(0, 255, 65, 0.1);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo h1 {
            font-family: 'Orbitron', monospace;
            font-size: 22px;
            font-weight: 700;
            color: #00ff41;
            text-shadow: 0 0 10px rgba(0, 255, 65, 0.5);
            letter-spacing: 1px;
        }

        .logo .tagline {
            font-family: 'Rajdhani', sans-serif;
            font-size: 12px;
            color: #888;
            font-weight: 400;
            letter-spacing: 0.5px;
        }

        .system-status {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 14px;
            background: rgba(0, 255, 65, 0.1);
            border: 1px solid #00ff41;
            border-radius: 15px;
            font-weight: 600;
            font-size: 11px;
            font-family: 'Rajdhani', sans-serif;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #00ff41;
            box-shadow: 0 0 10px #00ff41;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        .location-display {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 14px;
            background: rgba(0, 100, 255, 0.1);
            border: 1px solid #0066ff;
            border-radius: 15px;
            font-weight: 600;
            font-size: 11px;
            font-family: 'Rajdhani', sans-serif;
            color: #0066ff;
        }

        .location-icon {
            font-size: 12px;
        }

        .timestamp {
            font-size: 11px;
            font-weight: 600;
            color: #888;
            font-family: 'Rajdhani', sans-serif;
            padding: 6px 12px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .video-container {
            grid-area: video;
            background: #0a0a0a;
            border: 2px solid #00ff41;
            border-radius: 8px;
            overflow: hidden;
            position: relative;
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.2), inset 0 0 20px rgba(0, 255, 65, 0.05);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .video-feed {
            max-width: 100%;
            max-height: 100%;
            width: auto;
            height: auto;
            object-fit: contain;
            display: block;
        }

        .video-overlay {
            position: absolute;
            top: 12px;
            left: 12px;
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid #00ff41;
            padding: 8px 12px;
            border-radius: 4px;
            font-size: 12px;
            color: #00ff41;
            font-weight: 600;
            letter-spacing: 0.5px;
            font-family: 'Rajdhani', sans-serif;
        }

        .alerts-panel {
            grid-area: alerts;
            background: #0a0a0a;
            border: 2px solid #00ff41;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.2), inset 0 0 20px rgba(0, 255, 65, 0.05);
        }

        .panel-header {
            padding: 15px;
            border-bottom: 1px solid #00ff41;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .panel-header h2 {
            font-family: 'Orbitron', monospace;
            font-size: 16px;
            font-weight: 700;
            color: #00ff41;
            text-shadow: 0 0 5px rgba(0, 255, 65, 0.3);
            letter-spacing: 1px;
        }

        .alert-count {
            background: #ff0040;
            color: #000;
            padding: 3px 10px;
            border-radius: 10px;
            font-size: 11px;
            font-weight: bold;
            border: 1px solid #ff0040;
            box-shadow: 0 0 10px rgba(255, 0, 64, 0.5);
            font-family: 'Rajdhani', sans-serif;
        }

        .alerts-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }

        .alert-item {
            background: rgba(0, 255, 65, 0.05);
            border-radius: 6px;
            padding: 10px;
            margin-bottom: 8px;
            border-left: 3px solid #ff0040;
            border: 1px solid rgba(0, 255, 65, 0.2);
            transition: all 0.3s ease;
            font-size: 12px;
        }

        .alert-item.acknowledged {
            opacity: 0.4;
            border-left-color: #666;
            background: rgba(0, 255, 65, 0.02);
        }

        .alert-item.high { border-left-color: #ff0040; }
        .alert-item.medium { border-left-color: #ffaa00; }
        .alert-item.low { border-left-color: #00aaff; }

        .alert-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 8px;
        }

        .alert-type {
            font-weight: 700;
            font-size: 12px;
            color: #00ff41;
            letter-spacing: 0.5px;
            font-family: 'Rajdhani', sans-serif;
        }

        .alert-severity {
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 9px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-family: 'Rajdhani', sans-serif;
        }

        .severity-high { background: #ff0040; color: #000; }
        .severity-medium { background: #ffaa00; color: #000; }
        .severity-low { background: #00aaff; color: #000; }

        .alert-message {
            font-size: 11px;
            margin-bottom: 6px;
            opacity: 0.9;
            color: #ccc;
            font-family: 'Rajdhani', sans-serif;
        }

        .alert-meta {
            display: flex;
            justify-content: space-between;
            font-size: 10px;
            opacity: 0.7;
            color: #888;
            font-family: 'Rajdhani', sans-serif;
        }

        .alert-actions {
            margin-top: 8px;
            display: flex;
            gap: 6px;
        }

        .btn {
            padding: 4px 8px;
            border: 1px solid;
            border-radius: 3px;
            font-size: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
            letter-spacing: 0.3px;
            font-family: 'Rajdhani', sans-serif;
        }

        .btn-ack {
            background: #00ff41;
            color: #000;
            border-color: #00ff41;
        }

        .btn-ack:hover {
            background: #00cc33;
            box-shadow: 0 0 10px rgba(0, 255, 65, 0.5);
        }

        .btn-dismiss {
            background: #666;
            color: #fff;
            border-color: #666;
        }

        .stats-panel {
            background: #1a2536;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            height: 100%;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .stat-value {
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 12px;
            opacity: 0.8;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stat-card.fps .stat-value { color: #2ecc71; }
        .stat-card.alerts .stat-value { color: #e74c3c; }
        .stat-card.tracks .stat-value { color: #3498db; }
        .stat-card.frames .stat-value { color: #9b59b6; }

        .controls {
            display: flex;
            gap: 8px;
            margin-top: 10px;
            padding: 8px;
        }

        .btn-test {
            background: #00ff41;
            color: #000;
            padding: 6px 12px;
            border: 1px solid #00ff41;
            border-radius: 4px;
            cursor: pointer;
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 0.3px;
            font-family: 'Rajdhani', sans-serif;
        }

        .btn-test:hover {
            background: #00cc33;
            box-shadow: 0 0 10px rgba(0, 255, 65, 0.5);
        }

        /* Scrollbar styling */
        .alerts-list::-webkit-scrollbar {
            width: 6px;
        }

        .alerts-list::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
        }

        .alerts-list::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.3);
            border-radius: 3px;
        }

        .stats-panel {
            background: #0a0a0a;
            border: 2px solid #00ff41;
            border-radius: 8px;
            padding: 12px;
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.2), inset 0 0 20px rgba(0, 255, 65, 0.05);
        }

        .stats-header {
            font-family: 'Orbitron', monospace;
            font-size: 14px;
            font-weight: 700;
            color: #00ff41;
            text-shadow: 0 0 5px rgba(0, 255, 65, 0.3);
            letter-spacing: 1px;
            margin-bottom: 10px;
            text-align: center;
        }

        .stats-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .stat-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 10px;
            background: rgba(0, 255, 65, 0.05);
            border: 1px solid rgba(0, 255, 65, 0.2);
            border-radius: 4px;
            font-family: 'Rajdhani', sans-serif;
        }

        .stat-label {
            font-size: 11px;
            color: #888;
            font-weight: 500;
            letter-spacing: 0.3px;
        }

        .stat-value {
            font-size: 12px;
            color: #00ff41;
            font-weight: 700;
            text-shadow: 0 0 3px rgba(0, 255, 65, 0.3);
        }

        .stat-value.fps { color: #2ecc71; }
        .stat-value.alerts { color: #ff0040; }
        .stat-value.frames { color: #00aaff; }

        /* Header layout improvements */
        .header-content {
            display: flex;
            align-items: center;
            gap: 25px;
        }

        .status-group {
            display: flex;
            align-items: center;
            gap: 12px;
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <!-- Header -->
        <header class="header">
            <div class="logo">
                <h1>MILITARY SURVEILLANCE COMMAND</h1>
                <span class="tagline">CLASSIFIED: Edge-Powered Anomaly Detection System</span>
            </div>
            <div class="header-content">
                <div class="status-group">
                    <div class="status-indicator">
                        <div class="status-dot"></div>
                        <span>SYSTEM ACTIVE</span>
                    </div>
                    <div class="location-display">
                        <span class="location-icon">📍</span>
                        <span id="location-text">ACQUIRING GPS...</span>
                    </div>
                </div>
                <div id="current-time" class="timestamp"></div>
            </div>
        </header>

        <!-- Video Feed -->
        <div class="video-container">
            <img src="{{ url_for('video_feed') }}" class="video-feed" alt="Live Video Feed">
            <div class="video-overlay">
                LIVE COMBAT SURVEILLANCE FEED
            </div>
        </div>

        <!-- Right Panel -->
        <div class="right-panel">
            <!-- Statistics Panel -->
            <div class="stats-panel">
                <div class="stats-header">MISSION STATUS</div>
                <div class="stats-list">
                    <div class="stat-item">
                        <span class="stat-label">CURRENT FPS</span>
                        <span class="stat-value fps" id="fps-value">0.0</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">FRAMES PROCESSED</span>
                        <span class="stat-value frames" id="frames-value">0</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">TOTAL ALERTS</span>
                        <span class="stat-value alerts" id="total-alerts">0</span>
                    </div>
                </div>
            </div>

            <!-- Alerts Panel -->
            <div class="alerts-panel">
                <div class="panel-header">
                    <h2>THREAT ASSESSMENT</h2>
                    <div class="alert-count" id="alert-count">0</div>
                </div>
                <div class="alerts-list" id="alerts-list">
                    <!-- Alerts will be populated by JavaScript -->
                    <div class="alert-item" style="text-align: center; opacity: 0.7;">
                        SCANNING FOR THREATS...
                    </div>
                </div>
                <div class="controls">
                    <button class="btn-test" onclick="generateTestAlert()">SIMULATE THREAT</button>
                    <button class="btn-test" onclick="acknowledgeAll()">CLEAR ALL</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Update current time
        function updateTime() {
            const now = new Date();
            document.getElementById('current-time').textContent = 
                now.toLocaleString('en-US', { 
                    year: 'numeric',
                    month: 'short',
                    day: 'numeric',
                    hour: '2-digit',
                    minute: '2-digit',
                    second: '2-digit',
                    hour12: true 
                });
        }
        setInterval(updateTime, 1000);
        updateTime();

        // Geolocation functionality
        function getGeolocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        const lat = position.coords.latitude.toFixed(4);
                        const lon = position.coords.longitude.toFixed(4);
                        const accuracy = position.coords.accuracy.toFixed(1);
                        
                        document.getElementById('location-text').textContent = 
                            `${lat}°N, ${lon}°E (±${accuracy}m)`;
                    },
                    (error) => {
                        console.error('Geolocation error:', error);
                        // Fallback to simulated military coordinates
                        const simulatedLocations = [
                            "34.0522°N, 118.2437°W (±5.2m)",
                            "40.7128°N, 74.0060°E (±3.8m)", 
                            "51.5074°N, 0.1278°W (±7.1m)",
                            "35.6762°N, 139.6503°E (±4.5m)",
                            "48.8566°N, 2.3522°E (±6.3m)"
                        ];
                        const randomLocation = simulatedLocations[Math.floor(Math.random() * simulatedLocations.length)];
                        document.getElementById('location-text').textContent = randomLocation;
                    },
                    {
                        enableHighAccuracy: true,
                        timeout: 5000,
                        maximumAge: 300000 // 5 minutes
                    }
                );
            } else {
                document.getElementById('location-text').textContent = "GPS UNAVAILABLE";
            }
        }

        // Initialize geolocation
        getGeolocation();
        // Update location every 30 seconds
        setInterval(getGeolocation, 30000);

        // Fetch and display alerts
        async function fetchAlerts() {
            try {
                const response = await fetch('/api/alerts');
                const data = await response.json();
                
                const alertsList = document.getElementById('alerts-list');
                const alertCount = document.getElementById('alert-count');
                
                alertCount.textContent = data.unacknowledged;
                
                if (data.alerts.length === 0) {
                    alertsList.innerHTML = '<div class="alert-item" style="text-align: center; opacity: 0.7;">ALL CLEAR - NO THREATS DETECTED</div>';
                    return;
                }
                
                alertsList.innerHTML = data.alerts.map(alert => `
                    <div class="alert-item ${alert.severity} ${alert.acknowledged ? 'acknowledged' : ''}">
                        <div class="alert-header">
                            <div class="alert-type">${alert.type.replace('_', ' ').toUpperCase()}</div>
                            <div class="alert-severity severity-${alert.severity}">${alert.severity}</div>
                        </div>
                        <div class="alert-message">${alert.message}</div>
                        <div class="alert-meta">
                            <span>Object: ${alert.object_id}</span>
                            <span>Location: ${alert.location}</span>
                        </div>
                        <div class="timestamp">${new Date(alert.timestamp).toLocaleString()}</div>
                        ${!alert.acknowledged ? `
                            <div class="alert-actions">
                                <button class="btn btn-ack" onclick="acknowledgeAlert(${alert.id})">Acknowledge</button>
                            </div>
                        ` : ''}
                    </div>
                `).join('');
            } catch (error) {
                console.error('Error fetching alerts:', error);
            }
        }

        // Fetch system statistics
        async function fetchStats() {
            try {
                const response = await fetch('/api/stats');
                const data = await response.json();
                
                document.getElementById('fps-value').textContent = data.current_fps.toFixed(1);
                document.getElementById('frames-value').textContent = (data.total_frames / 1000).toFixed(1) + 'K';
                document.getElementById('total-alerts').textContent = data.total_alerts;
            } catch (error) {
                console.error('Error fetching stats:', error);
            }
        }

        // Acknowledge an alert
        async function acknowledgeAlert(alertId) {
            try {
                const response = await fetch(`/api/alerts/${alertId}/acknowledge`, {
                    method: 'POST'
                });
                if (response.ok) {
                    fetchAlerts(); // Refresh alerts
                }
            } catch (error) {
                console.error('Error acknowledging alert:', error);
            }
        }

        // Acknowledge all alerts
        async function acknowledgeAll() {
            try {
                const response = await fetch('/api/alerts/clear', {
                    method: 'POST'
                });
                if (response.ok) {
                    fetchAlerts(); // Refresh alerts
                    fetchStats(); // Refresh stats
                }
            } catch (error) {
                console.error('Error clearing all alerts:', error);
            }
        }

        // Generate test alert
        async function generateTestAlert() {
            try {
                const response = await fetch('/api/test_alert', { method: 'POST' });
                if (response.ok) {
                    fetchAlerts(); // Refresh alerts
                    fetchStats(); // Refresh stats
                }
            } catch (error) {
                console.error('Error generating test alert:', error);
            }
        }

        // Periodic updates
        setInterval(fetchAlerts, 2000); // Update alerts every 2 seconds
        setInterval(fetchStats, 1000); // Update stats every second

        // Initial load
        fetchAlerts();
        fetchStats();
    </script>
</body>
</html>
